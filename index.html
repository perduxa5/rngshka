<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎁 Gift RNG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg:#06060f;--s1:#0d0d1e;--s2:#13132a;--b:#22224a;--tx:#e8e8f8;--tx2:#8888b8;--tx3:#3a3a6a;
  --gold:#f5c842;--dia:#3de8fa;--acc:#4f8ef7;--grn:#10b981;--red:#ef4444;
  --font:'Manrope',system-ui,sans-serif
}
html,body{height:100%;overflow:hidden}
body{background:radial-gradient(ellipse at 25% 10%,#0e0e2a,var(--bg) 70%);display:flex;justify-content:center;font-family:var(--font);color:var(--tx)}
#app{width:100%;max-width:430px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:10px 14px 8px;display:flex;justify-content:space-between;align-items:center;background:rgba(13,13,30,.97);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;z-index:10}
.ht{font-size:14px;font-weight:900;background:linear-gradient(135deg,#fff 20%,#9898d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.xrow{display:flex;align-items:center;gap:5px;margin-top:2px}
.xbar{width:80px;height:3px;background:var(--b);border-radius:2px;overflow:hidden}
.xf{height:100%;background:linear-gradient(90deg,var(--acc),#8b5cf6);transition:width .5s}
.xlbl{font-size:9px;color:var(--tx3);font-weight:600}
.hpills{display:flex;gap:4px;align-items:center}
.pill{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:3px 7px;border-radius:8px;font-size:11px;font-weight:700}
.vbtn{background:none;border:none;cursor:pointer;font-size:16px;padding:3px;opacity:.65}
#nav{display:grid;grid-template-columns:repeat(4,1fr);background:rgba(10,10,22,.98);border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;z-index:10}
.nb{background:none;border:none;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-size:10px;font-weight:700;font-family:var(--font);color:var(--tx3);border-top:2px solid transparent;transition:all .15s}
.nb.on{color:var(--acc);border-top-color:var(--acc)}
.nb .ti{font-size:20px}
#ct{flex:1;overflow-y:auto;overflow-x:hidden;padding:13px}
#ct::-webkit-scrollbar{width:0}
/* Cards */
.gc{position:relative;overflow:hidden;border-radius:16px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.gc:active,.bpc:active{transform:scale(.93)}
.gi{display:flex;align-items:center;justify-content:center}
.gi svg{width:100%;height:100%;filter:drop-shadow(0 3px 12px rgba(0,0,0,.5))}
.sh{position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(160deg,rgba(255,255,255,.2) 0%,rgba(255,255,255,.07) 45%,transparent 100%);pointer-events:none;z-index:5}
.fl{position:absolute;bottom:0;left:0;right:0;height:44%;background:linear-gradient(to top,rgba(0,0,0,.55),transparent);z-index:4;pointer-events:none}
.gn{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.52);font-size:8px;font-weight:800;text-align:center;padding:3px;color:#fff;z-index:6;text-transform:uppercase;letter-spacing:.3px}
.gcnt{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:5px;z-index:7}
/* Sweep shimmer */
.gc::after,.tgb::after{content:'';position:absolute;top:0;left:-70%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);animation:sweep calc(var(--sw,3.5s)) ease-in-out infinite;z-index:8;pointer-events:none;border-radius:inherit}
@keyframes sweep{0%,100%{left:-70%;opacity:0}25%{opacity:1}55%{left:130%;opacity:0}}
/* Rarity borders */
.U{outline:2px solid rgba(66,165,245,.6);box-shadow:0 0 14px rgba(66,165,245,.22),0 4px 20px rgba(0,0,0,.6)}
.R{outline:2px solid rgba(186,104,200,.75);box-shadow:0 0 18px rgba(186,104,200,.3),0 4px 20px rgba(0,0,0,.6)}
.E{outline:2px solid rgba(255,167,38,.85);box-shadow:0 0 22px rgba(255,167,38,.35),0 4px 20px rgba(0,0,0,.6)}
.L{outline:2px solid #f5c842;box-shadow:0 0 32px rgba(245,200,66,.6),0 4px 20px rgba(0,0,0,.6);animation:lglow 2s infinite}
@keyframes lglow{0%,100%{box-shadow:0 0 32px rgba(245,200,66,.6)}50%{box-shadow:0 0 50px rgba(245,200,66,.85)}}
/* Big card */
.tgb{position:relative;overflow:hidden;border-radius:22px;width:152px;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 50px rgba(0,0,0,.8);border:2px solid rgba(255,255,255,.12);--sw:4.5s}
.tgb .gi{width:70%;height:62%;z-index:2}
.tgb .sh{height:55%;background:linear-gradient(160deg,rgba(255,255,255,.24) 0%,rgba(255,255,255,.09) 48%,transparent 100%);z-index:6}
.tgb .fl{height:46%;z-index:5}
.tgb .rar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:7;font-size:9px;font-weight:800;padding:3px 11px;border-radius:20px;white-space:nowrap}
.tgb .gn{position:absolute;bottom:14px;left:8px;right:8px;z-index:7;font-size:11px;font-weight:900;text-align:center;color:#fff;letter-spacing:.7px;text-transform:uppercase;text-shadow:0 1px 6px rgba(0,0,0,.9);background:none}
.tgb.do-pop{animation:bpop .55s cubic-bezier(.175,.885,.32,1.4)}
.tgb.is-spin .gi{animation:spngi .5s ease-in-out infinite alternate}
@keyframes bpop{0%{transform:scale(.04) rotate(-10deg);opacity:0}60%{transform:scale(1.14) rotate(3deg)}82%{transform:scale(.97)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes spngi{0%{transform:scale(.65) rotate(-8deg);filter:blur(4px) brightness(.5)}100%{transform:scale(1.05) rotate(5deg);filter:blur(0) brightness(1.2)}}
/* Overlay */
#ov{position:fixed;inset:0;z-index:100;background:rgba(2,2,14,.94);backdrop-filter:blur(8px) saturate(.7);display:none;flex-direction:column;align-items:center;justify-content:space-between;padding:14px 14px 18px;gap:10px}
#ov.open{display:flex}
.ovbg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.fg{position:absolute;width:34px;height:34px;opacity:.09;animation:fga var(--d) ease-in-out infinite alternate}
.fg svg{width:100%;height:100%}
@keyframes fga{from{transform:translate(0,0) rotate(0deg) scale(1)}to{transform:translate(var(--tx),var(--ty)) rotate(var(--r)) scale(var(--s))}}
.cubes{display:flex;gap:10px;z-index:2}
.cp{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:14px;padding:9px 13px;text-align:center;min-width:88px}
.cp-l{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.cp-b{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-bottom:3px}
.cp-f{height:100%;border-radius:2px;transition:width .35s}
.cp-c{font-size:10px;font-weight:800;color:rgba(255,255,255,.65)}
.cp-x{font-size:15px;font-weight:900;margin-top:1px}
.ov-stage{z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative}
.bfl{position:absolute;top:-16px;font-size:12px;font-weight:900;padding:4px 14px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;left:50%;transform:translateX(-50%);white-space:nowrap}
.bfl.on{opacity:1}
.sri{text-align:center;min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.sri-n{font-size:18px;font-weight:900;color:#fff}
.sri-r{font-size:11px;font-weight:800;padding:3px 13px;border-radius:20px;display:inline-block}
.ov-btns{display:flex;gap:8px;z-index:2}
.ob{padding:11px 18px;border:none;border-radius:13px;font-size:13px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all .2s}
.ob:active{transform:scale(.95)}
.ob.pri{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 18px rgba(99,102,241,.4)}
.ob.sec{background:rgba(255,255,255,.09);color:var(--tx);border:1px solid rgba(255,255,255,.13)}
.ob.aon{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.ob:disabled{opacity:.4;cursor:default}
/* Flash */
.ffx{position:fixed;inset:0;z-index:999;pointer-events:none;opacity:0;transition:opacity .15s}
.ffx.gfx{background:radial-gradient(circle at 50% 50%,rgba(245,200,66,.4),transparent 70%)}
.ffx.dfx{background:radial-gradient(circle at 50% 50%,rgba(61,232,250,.35),transparent 70%)}
.ffx.on{opacity:1}
/* Reveal */
#rev{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
#rev.on{display:flex}
.rev-bg{position:absolute;inset:0;background:rgba(0,0,0,.97)}
.rev-rays{position:absolute;inset:-80px;animation:rayspin 5s linear infinite;pointer-events:none;opacity:0;transition:opacity .6s}
.rev-rays.on{opacity:1}
@keyframes rayspin{to{transform:rotate(360deg)}}
.rev-card{position:relative;z-index:3;transform:scale(0);opacity:0;transition:transform .6s cubic-bezier(.175,.885,.32,1.4),opacity .3s}
.rev-card.on{transform:scale(1);opacity:1}
.rev-ttl{position:relative;z-index:3;font-size:26px;font-weight:900;letter-spacing:2px;text-transform:uppercase;opacity:0;transition:opacity .4s .5s;text-align:center;margin-top:14px}
.rev-ttl.on{opacity:1}
.rev-sub{position:relative;z-index:3;font-size:12px;color:rgba(255,255,255,.4);margin-top:8px;font-weight:600;opacity:0;transition:opacity .4s .9s}
.rev-sub.on{opacity:1}
/* PiP */
.pip{background:var(--s2);border:1px solid var(--b);border-radius:16px;overflow:hidden;margin-top:13px}
.pip-top{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--b)}
.pip-title{font-size:11px;font-weight:800;color:var(--tx2)}
.pip-exp{padding:5px 10px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:10px;font-weight:800;font-family:var(--font);cursor:pointer}
.pip-body{display:flex;align-items:center;gap:11px;padding:10px 12px}
.pip-card{width:62px;height:84px;border-radius:12px;flex-shrink:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.pip-card .sh{z-index:3}.pip-card .gi{width:68%;height:68%;z-index:2}.pip-card .fl{z-index:4}
.pip-card.is-spin .gi{animation:spngi .5s ease-in-out infinite alternate}
.pip-info{flex:1}.pip-nm{font-size:12px;font-weight:800;margin-bottom:3px}
.pip-rr{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:8px}
.pip-btns{display:flex;gap:6px}
.pip-btn{padding:7px 12px;border:none;border-radius:9px;font-size:11px;font-weight:800;font-family:var(--font);cursor:pointer;transition:all .15s}
.pip-btn:active{transform:scale(.94)}
.pip-btn.p{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff}
.pip-btn.s{background:rgba(255,255,255,.09);color:var(--tx);border:1px solid rgba(255,255,255,.12)}
.pip-btn.a{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.pip-btn:disabled{opacity:.4;cursor:default}
/* Upgrades */
.utabs{display:flex;gap:6px;margin-bottom:13px;overflow-x:auto;padding-bottom:2px}
.utabs::-webkit-scrollbar{height:0}
.utab{padding:7px 12px;border:1px solid var(--b);border-radius:9px;background:var(--s2);color:var(--tx2);font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.utab.on{background:#0e0e35;border-color:var(--acc);color:var(--acc)}
.bline{width:2px;height:16px;background:var(--b);margin:0 auto;transition:background .3s}
.bline.lit{background:var(--acc)}
.unode{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:13px;padding:10px 11px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:9px}
.unode:hover:not(.ulk){border-color:rgba(79,142,247,.5);background:#0e0e30}
.unode:active:not(.ulk){transform:scale(.97)}
.unode.umx{border-color:rgba(79,142,247,.3)}.unode.ulk{opacity:.28;cursor:default}
.uico{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ubod{flex:1;min-width:0}.unam{font-size:12px;font-weight:800;margin-bottom:1px}.udsc{font-size:9.5px;color:var(--tx2)}.usub{font-size:9px;font-weight:700;margin-top:3px}
.udots{display:flex;gap:3px;margin-top:4px}.udot{width:7px;height:7px;border-radius:50%;background:var(--b)}
.ucst{font-size:11px;font-weight:800;color:var(--gold);background:rgba(245,200,66,.1);padding:4px 8px;border-radius:7px;flex-shrink:0;white-space:nowrap}
/* Spin */
.smb{width:100%;padding:17px;border:none;border-radius:15px;font-size:17px;font-weight:900;font-family:var(--font);cursor:pointer;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 5px 24px rgba(99,102,241,.4);transition:all .2s;margin-top:4px}
.smb:hover{box-shadow:0 7px 30px rgba(99,102,241,.55);transform:translateY(-1px)}.smb:active{transform:scale(.97);box-shadow:none}
.mc{background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:9px 11px;opacity:.35;transition:opacity .3s}.mc.act{opacity:1}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:11px}
.sc{background:var(--s2);border:1px solid var(--b);border-radius:11px;padding:10px;text-align:center}
.sv2{font-size:17px;font-weight:900}.sl{font-size:9px;color:var(--tx2);margin-top:2px;font-weight:600}
/* Battle */
.bwrap{display:flex;flex-direction:column;gap:12px}
.bslots{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bslot{aspect-ratio:1;border-radius:14px;border:2px dashed var(--b);display:flex;align-items:center;justify-content:center;background:var(--s2);position:relative;overflow:hidden}
.bslot .gi{width:68%;height:68%;z-index:2}.bslot .sh{z-index:3}
.bslot .xb{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900;z-index:10}
.bagrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.bacard{aspect-ratio:1;border-radius:11px;border:2px solid transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.bacard .gi{width:65%;height:65%;z-index:2}.bacard .sh{z-index:3}
.bac{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);font-size:9px;font-weight:800;color:#fff;padding:2px 4px;border-radius:4px;z-index:5}
.bacard.sel{transform:scale(.9);border-color:rgba(255,255,255,.7)!important}
.fbtns{display:flex;gap:8px;margin-top:4px}
.fbt{flex:1;padding:14px;border:none;border-radius:14px;font-size:14px;font-weight:900;font-family:var(--font);cursor:pointer;transition:all .2s}
.fbt.fight{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.fbt.fight:hover:not(:disabled){box-shadow:0 5px 20px rgba(220,38,38,.4)}
.fbt.abtn{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff}
.fbt.abtn.on{background:linear-gradient(135deg,#059669,#10b981)}
.fbt:active:not(:disabled){transform:scale(.97)}.fbt:disabled{opacity:.4;cursor:default}
.auto-st{display:flex;align-items:center;justify-content:space-between;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:10px 13px;font-size:12px;font-weight:700;margin-top:8px}
.bres{border-radius:16px;padding:18px 15px;text-align:center;background:var(--s2);border:2px solid}
.bres.win{border-color:#10b981}.bres.los{border-color:var(--red)}
.bri{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.05);border-radius:9px;padding:7px 11px;margin:4px 0;text-align:left}
.clm{padding:11px 26px;border:none;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:14px;font-weight:800;font-family:var(--font);cursor:pointer;margin-top:8px}
/* Backpack */
.bpgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bpc{aspect-ratio:1;border-radius:14px;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bpc.lk{filter:grayscale(1) brightness(.28);cursor:default}
.bpc .gi{width:68%;height:68%;z-index:2}.bpc .sh{z-index:3}
.bpc .bpn{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.52);font-size:7.5px;font-weight:800;text-align:center;padding:3px;color:#fff;z-index:4;text-transform:uppercase;letter-spacing:.3px}
.bpc .bpcnt{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:5px;z-index:5}
/* Detail */
.gds{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;background:rgba(0,0,0,.75);backdrop-filter:blur(8px)}
.gdp{width:100%;max-width:430px;margin:0 auto;background:linear-gradient(to bottom,var(--s1),var(--bg));border-radius:24px 24px 0 0;padding:18px 15px 30px;border-top:1px solid rgba(255,255,255,.08);max-height:84vh;overflow-y:auto}
.gdp::-webkit-scrollbar{width:0}
.gdh{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.gdcrd{width:64px;height:84px;border-radius:13px;position:relative;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.gdcrd .gi{width:72%;height:72%;z-index:2}.gdcrd .sh{z-index:5}
.gd-nm{font-size:17px;font-weight:900}.gd-rr{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:3px}.gd-ct{font-size:11px;color:var(--tx2);margin-top:4px;font-weight:600}
.gds-t{font-size:10px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;margin-top:14px}
.skgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.skc{border-radius:12px;border:2px solid var(--b);padding:9px;cursor:pointer;transition:all .15s;background:var(--s2)}.skc.eq{border-color:var(--acc);background:#0c0c30}.skc:active{transform:scale(.96)}
.skpre{display:flex;align-items:center;justify-content:center;height:44px;gap:4px}.skpre svg{height:100%;width:auto;max-width:50px}
.sknam{font-size:10px;font-weight:800;text-align:center}.skbon{font-size:9px;color:#10b981;text-align:center;margin-top:2px;font-weight:600}.skcst{font-size:9px;color:var(--gold);text-align:center;margin-top:3px;font-weight:700}
/* Quests / Rebirth / LB */
.qc{background:var(--s2);border:1px solid var(--b);border-radius:13px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:11px}
.qico{width:40px;height:40px;border-radius:11px;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.qbd{flex:1}.qnm{font-size:12px;font-weight:800;margin-bottom:2px}.qds{font-size:10px;color:var(--tx2);margin-bottom:4px}
.qbar{height:3px;background:var(--b);border-radius:2px;overflow:hidden}.qbf{height:100%;background:linear-gradient(90deg,var(--acc),#8b5cf6);border-radius:2px;transition:width .5s}
.qpg{font-size:9px;color:var(--tx3);margin-top:3px;font-weight:600}.qrw{font-size:12px;font-weight:800;color:var(--gold)}
.qcbtn{padding:7px 11px;border:none;border-radius:9px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:11px;font-weight:800;font-family:var(--font);cursor:pointer}

/* Slot reel (Slime RNG style) */

.clover-pop{animation:cloverPop .5s cubic-bezier(.175,.885,.32,1.4) forwards}

#mini-reel{display:flex;position:absolute;top:0;left:0;height:90px;will-change:transform}

/* Toggle button */

/* Reel item img */

img[style*="object-fit:contain"]{display:block!important}

.sri-item{height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0}
.sri-sh{position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,.22),transparent);pointer-events:none;z-index:4}

// ── Sound ──
const SFX={ctx:null,vol:true,_bgOsc:null,_bgGain:null,
  init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},
  wake(){if(this.ctx?.state==="suspended")this.ctx.resume();},

  // Generic oscillator tone helper
  tone(fr,dur,type,gain,st){
    if(!this.ctx||!this.vol)return;
    try{
      const now=this.ctx.currentTime+(st||0);
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.type=type||"sine";o.frequency.value=fr;
      g.gain.setValueAtTime(0.001,now);g.gain.linearRampToValueAtTime(gain||0.2,now+.008);
      g.gain.exponentialRampToValueAtTime(0.001,now+dur);
      o.start(now);o.stop(now+dur+.05);
    }catch(e){}
  },

  // Noise burst helper — short filtered click
  _noise(freq,Q,gainVal,dur){
    if(!this.ctx||!this.vol)return;
    try{
      const sr=this.ctx.sampleRate,now=this.ctx.currentTime;
      const buf=this.ctx.createBuffer(1,Math.ceil(sr*dur),sr);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
      const src=this.ctx.createBufferSource();src.buffer=buf;
      const f=this.ctx.createBiquadFilter();f.type="bandpass";f.frequency.value=freq;f.Q.value=Q;
      const g=this.ctx.createGain();g.gain.setValueAtTime(gainVal,now);g.gain.exponentialRampToValueAtTime(0.001,now+dur);
      src.connect(f);f.connect(g);g.connect(this.ctx.destination);
      src.start(now);src.stop(now+dur+.01);
    }catch(e){}
  },

  // CS:GO-style background motor hum during spin
  startBg(){
    if(!this.ctx||!this.vol||this._bgOsc)return;
    try{
      const now=this.ctx.currentTime;
      this._bgOsc=this.ctx.createOscillator();
      const lpf=this.ctx.createBiquadFilter();lpf.type="lowpass";lpf.frequency.value=180;
      this._bgGain=this.ctx.createGain();
      this._bgOsc.type="sawtooth";
      this._bgOsc.frequency.setValueAtTime(55,now);
      this._bgOsc.frequency.linearRampToValueAtTime(75,now+2);
      this._bgOsc.frequency.linearRampToValueAtTime(55,now+4.5);
      this._bgGain.gain.setValueAtTime(0,now);
      this._bgGain.gain.linearRampToValueAtTime(0.05,now+0.2);
      this._bgOsc.connect(lpf);lpf.connect(this._bgGain);this._bgGain.connect(this.ctx.destination);
      this._bgOsc.start(now);
    }catch(e){}
  },
  stopBg(){
    if(!this._bgOsc)return;
    try{
      const now=this.ctx.currentTime;
      this._bgGain.gain.setValueAtTime(this._bgGain.gain.value,now);
      this._bgGain.gain.linearRampToValueAtTime(0,now+0.25);
      this._bgOsc.stop(now+0.3);
    }catch(e){}
    this._bgOsc=null;this._bgGain=null;
  },

  // Case-opening style tick — punchy clack, pitch drops as reel slows
  tick(speed){
    // speed: 1=fast, 0=stopped
    if(!this.ctx||!this.vol)return;
    // High crack for fast spin, deep thock for slow
    const freq = 2200 - speed * 1400;          // 800 Hz slow → 2200 Hz fast
    const gainV = 0.12 + (1 - speed) * 0.18;   // louder when slow (anticipation)
    const dur = 0.018 + (1 - speed) * 0.025;
    this._noise(freq, 3, gainV, dur);
    // Low thud component on slow ticks (last few clicks before stop)
    if(speed < 0.35) this.tone(60 + speed*80, 0.06+speed*0.04, "sine", 0.18*(1-speed));
  },

  // Landing clunk — reel stops
  land(){
    if(!this.ctx||!this.vol)return;
    this.stopBg();
    // Deep mechanical thud
    this.tone(48,0.35,"sine",0.45);
    this.tone(96,0.18,"sine",0.3,0.01);
    // High crack
    this._noise(3500,2,0.22,0.03);
    // Short shimmer sparkle
    [2000,2800].forEach((f,i)=>this.tone(f,0.09,"sine",0.08,0.02+i*0.02));
  },

  // Drop sound by rarity — progressively more epic
  drop(r){
    this.wake();
    if(r==="C"){
      // Single clean soft ding
      this.tone(1046,0.4,"sine",0.22);
    }
    else if(r==="U"){
      // Two-note chime
      this.tone(880,0.35,"sine",0.2);
      this.tone(1320,0.4,"sine",0.22,0.1);
    }
    else if(r==="R"){
      // Ascending three bells + light shimmer
      [659,880,1319].forEach((f,i)=>this.tone(f,0.45,"sine",0.22,i*0.1));
      setTimeout(()=>this._noise(4000,1.5,0.1,0.08),350);
    }
    else if(r==="E"){
      // Dramatic synth hit — bass boom + rising chord + sparkle burst
      this.tone(55,0.7,"sawtooth",0.18);          // heavy bass
      this.tone(110,0.5,"sine",0.22,0.05);
      [440,554,659,880].forEach((f,i)=>this.tone(f,0.6,"sine",0.2,0.08+i*0.07));
      setTimeout(()=>[1760,2217,2637].forEach((f,i)=>this.tone(f,0.25,"sine",0.15,i*0.05)),500);
      setTimeout(()=>this._noise(5000,1,0.15,0.12),600);
    }
    else{
      // LEGENDARY — full CS:GO jackpot sound
      // 1) Deep bass hit
      this.tone(41,1.2,"sawtooth",0.3);
      this.tone(82,0.9,"sine",0.25,0.04);
      // 2) Fast rising sparkle sweep
      [262,330,392,523,659,784,1047,1319,1568,2093].forEach((f,i)=>
        this.tone(f,0.5,"sine",0.22,0.05+i*0.08));
      // 3) Second wave — triumphant bells
      setTimeout(()=>{
        [523,659,784,1047,1319].forEach((f,i)=>this.tone(f,0.7,"sine",0.3,i*0.09));
        this._noise(6000,1,0.2,0.15);
      },950);
      // 4) Shimmering tail
      setTimeout(()=>[2093,2637,3136,4186].forEach((f,i)=>this.tone(f,0.5,"sine",0.18,i*0.07)),1800);
    }
  },

  whoosh(){// short upward sweep at spin start — case opening whoosh
    if(!this.ctx||!this.vol)return;
    try{
      const now=this.ctx.currentTime;
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      const flt=this.ctx.createBiquadFilter();flt.type="highpass";flt.frequency.value=600;
      o.connect(flt);flt.connect(g);g.connect(this.ctx.destination);
      o.type="sawtooth";
      o.frequency.setValueAtTime(120,now);
      o.frequency.exponentialRampToValueAtTime(1800,now+0.4);
      g.gain.setValueAtTime(0.001,now);
      g.gain.linearRampToValueAtTime(0.09,now+0.06);
      g.gain.exponentialRampToValueAtTime(0.001,now+0.42);
      o.start(now);o.stop(now+0.46);
    }catch(e){}
  },
};

// ── Roll ──
// Skin power bonus + stats
function getGiftPower(giftId){
  const g=gid(giftId);if(!g)return 0;
  const sk=SKINS.find(s=>s.id===(S.col[giftId]?.skin||"std"))||SKINS[0];
  return Math.floor(g.pw*(1+(sk.pw||0)));
}
function getGiftStats(giftId){
  const g=gid(giftId);if(!g)return{loot:0,spd:0,luck:0};
  const b=RARITY_STATS[g.r]||{loot:0,spd:0,luck:0};
  const sk=SKINS.find(s=>s.id===(S.col[giftId]?.skin||"std"))||SKINS[0];
  const bg=BGS.find(b2=>b2.id===(S.col[giftId]?.bg||"std"))||BGS[0];
  return{loot:b.loot+(sk.loot||0)+(bg.loot||0),spd:b.spd+(sk.spd||0)+(bg.spd||0),luck:b.luck+(sk.luck||0)+(bg.luck||0)};
}
function getTeamStats(){
  let loot=0,spd=0,luck=0;
  S.team.forEach(id=>{const st=getGiftStats(id);loot+=st.loot;spd+=st.spd;luck+=st.luck;});
  return{loot:Math.round(loot),spd:Math.round(spd),luck:Math.round(luck)};
}
function rollGift(luckMult){
  luckMult=luckMult||1;
  // weight = supply^(1/luck) - with higher luck, rarer items get relatively more weight
  const exp = 1/Math.max(0.3,luckMult);
  const ws=GIFTS.map(g=>Math.pow(g.sup,exp));
  const tot=ws.reduce((a,b)=>a+b,0);
  let r=Math.random()*tot;
  for(let i=0;i<GIFTS.length;i++){r-=ws[i];if(r<=0)return GIFTS[i];}
  return GIFTS[GIFTS.length-1];
}
function pctChance(gift){
  const p=gift.sup/TOTAL_SUP*100;
  return p<0.1?p.toFixed(3):p<1?p.toFixed(2):p.toFixed(1);
}

  const ng=S.goldN+1,nd=S.diamN+1;
  let mult=S.luckM,bonus=null;
  if(hDD()&&nd%DI()===0){mult*=4;bonus="d";}else if(hGD()&&ng%GI()===0){mult*=2;bonus="g";}
  if(bonus){
    const ff=document.getElementById("ffx");ff.style.background="";
    ff.className="ffx "+(bonus==="g"?"gfx":"dfx")+" on";
    setTimeout(()=>ff.className="ffx",500);

    bf.textContent=bonus==="g"?"✨ УДАЧА ×2":"💎 УДАЧА ×4";

    bf.classList.add("on");setTimeout(()=>bf.classList.remove("on"),1200);
  }
  const btn=document.getElementById("ovspin");if(btn)btn.disabled=true;
  // Roll clovers — 20% chain chance each tier
  let clovMult=1;const droppedClovs=[];
  for(let i=0;i<CLOVERS.length;i++){
    if(Math.random()<0.20){clovMult*=CLOVERS[i].mult;droppedClovs.push(CLOVERS[i]);}
    else break;
  }
  const finalMult=mult*clovMult;
  const winner=rollGift(finalMult);
  if(S.tab==="spin") showSpinSection(true);
  SFX.whoosh();SFX.startBg();

}

function getBaitGift(winner){
  var targetSup = winner.sup * 0.12;
  var cands = GIFTS.filter(function(g){return g.id!==winner.id;}).map(function(g){return{g:g,d:Math.abs(g.sup-targetSup)};});

  return cands[0].g;
}

// ── Main spin entry ──
function startSlotSpin(winner, mult, clovs){
  var PAD_BEFORE = 50; // more items = faster-feeling scroll
  var CLOVER_GAP = 7;
  var IW = ITEM_W; // 110px per item

  var items = [];
  for(var i=0; i<PAD_BEFORE; i++) items.push(GIFTS[Math.floor(Math.random()*GIFTS.length)]);
  var cloverIdxs = [];
  (clovs||[]).forEach(function(clv){
    for(var j=0; j<CLOVER_GAP; j++) items.push(GIFTS[Math.floor(Math.random()*GIFTS.length)]);
    cloverIdxs.push(items.length);
    items.push({isClover:true, clv:clv});
  });
  for(var k=0; k<CLOVER_GAP; k++) items.push(GIFTS[Math.floor(Math.random()*GIFTS.length)]);
  var winIdx = items.length;
  items.push(winner);
  items.push(getBaitGift(winner)); // bait visible to right of winner
  for(var m=0; m<8; m++) items.push(GIFTS[Math.floor(Math.random()*GIFTS.length)]);
  var TOTAL = items.length;

  // ── Overlay reel (main animation) ──
  var reel = document.getElementById("slot-reel");
  var winEl = document.getElementById("slot-win");
  var selBox = document.getElementById("slot-selector-box");
  if(reel){
    reel.innerHTML = items.map(function(it){ return makeReelItem(it); }).join("");
    // Set item widths - override for overlay (slightly larger)
    reel.querySelectorAll('.sri-item').forEach(function(el){ el.style.width = IW+"px"; });
    if(winEl) winEl.style.cssText = "display:none;position:absolute;top:0;height:130px;width:"+IW+"px;left:50%;transform:translateX(-50%);z-index:15;flex-direction:column;overflow:hidden;border-radius:8px";
    var startX = -(TOTAL - 5) * IW;
    var endX   = -(winIdx - WIN_POS) * IW;
    reel.style.transition = "none";
    reel.style.transform = "translateX("+startX+"px)";
    void reel.offsetWidth;
    if(selBox) selBox.style.cssText = "position:absolute;top:0;bottom:0;left:50%;width:"+IW+"px;transform:translateX(-50%);border-left:3px solid rgba(255,255,255,.5);border-right:3px solid rgba(255,255,255,.5);z-index:11;pointer-events:none;box-shadow:0 0 0 1px rgba(255,255,255,.1) inset;transition:border-color .3s,box-shadow .3s";
  }

  // ── Inline reel (main page preview) ──
  var miniReel=document.getElementById('inline-reel');
  var MW=100; // inline item width
  if(miniReel){
    miniReel.innerHTML=items.map(function(it){
      if(it&&it.isClover){
        var c=it.clv;
        return "<div style='width:"+MW+"px;height:100px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,"+c.g1+","+c.g2+")'><div style='font-size:28px'>🍀</div><div style='font-size:12px;font-weight:900;color:"+c.col+"'>"+c.label+"</div></div>";
      }
      var g=it,rs=RS[g.r];
      return "<div style='width:"+MW+"px;height:100px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,"+g.g1+","+g.g2+");position:relative'><img src='"+IMG+g.id+"/thumb.webp' referrerpolicy='no-referrer' style='width:60%;height:60%;object-fit:contain' onerror=\"this.textContent='"+g.e+"'\"><div style='position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:7px;font-weight:800;color:#fff;background:rgba(0,0,0,.5);padding:2px'>"+g.n+"</div></div>";
    }).join('');
    var mStartX=-(TOTAL-5)*MW;
    var mEndX=-(winIdx-2)*MW;
    miniReel.style.transition='none';
    miniReel.style.transform='translateX('+mStartX+'px)';
    void miniReel.offsetWidth;
    var mSX=mStartX, mEX=mEndX;
  } else { var mSX=0, mEX=0; }

  showSpinSection(true);
  var resBar = document.getElementById("spin-result-bar");
  if(resBar) resBar.innerHTML = '<div style="font-size:12px;color:var(--tx2);font-weight:600;animation:pulse .5s infinite">Крутим...</div>';
  var sri = document.getElementById("sri");
  if(sri) sri.innerHTML = '<div style="font-size:13px;color:var(--tx2);font-weight:600;animation:pulse .4s infinite">Крутим...</div>';

  spinStartTime = Date.now();
  var sX = -(TOTAL-5)*IW;
  var eX = -(winIdx-WIN_POS)*IW;
  var mSX = miniReel ? -(TOTAL-5)*90 : 0;
  var mEX = miniReel ? -(winIdx-2)*90 : 0;

  if(cloverIdxs.length > 0){
    animMultiPhase(reel, sX, eX, cloverIdxs, winIdx, winner, clovs, miniReel, mSX, mEX);
  } else {
    spinDuration = 3000;
    animReelH(reel, sX, eX, miniReel, mSX, mEX, function(){ afterSpin(winner, reel); });
  }
}


function animReelH(reel, startX, endX, miniReel, mStartX, mEndX, onDone){
  // Handle old 4-arg calls
  if(typeof miniReel === 'function'){ onDone=miniReel; miniReel=null; mStartX=0; mEndX=0; }
  if(typeof mStartX === 'function'){ onDone=mStartX; mStartX=0; mEndX=0; }
  var dur = spinDuration || 3800;
  var t0 = spinStartTime;
  function frame(){
    var elapsed = Date.now() - t0;
    var t = Math.min(1, elapsed / dur);
    var e = 1 - Math.pow(1-t, 6); // very fast start, very slow end
    var curX = startX + (endX - startX) * e;
    if(reel) reel.style.transform = "translateX("+curX+"px)";
    if(miniReel) miniReel.style.transform = "translateX("+(mStartX+(mEndX-mStartX)*e)+"px)";
    var speed = 1-t;
    if(t < 0.92 && Math.random() < speed * 0.55) SFX.tick(speed);
    if(t < 1){
      requestAnimationFrame(frame);
    } else {
      if(reel) reel.style.transform = "translateX("+endX+"px)";
      if(miniReel) miniReel.style.transform = "translateX("+mEndX+"px)";
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

// ── Multi-phase: stop at each clover, then continue ──
function animMultiPhase(reel, startX, finalX, cloverIdxs, winIdx, winner, clovs, miniReel, mSX, mEX){
  var phases = [];
  cloverIdxs.forEach(function(ci, i){
    phases.push({ endX: -(ci - WIN_POS) * ITEM_W, dur: 1000 + i*100, isClover: true, clv: clovs[i] });
  });
  phases.push({ endX: finalX, dur: 2200, isClover: false, mEndX: mEX||0 });

  var phaseIdx = 0;
  var curX = startX;

  function runPhase(){
    if(phaseIdx >= phases.length) return;
    var ph = phases[phaseIdx];
    spinStartTime = Date.now();
    spinDuration = ph.dur;
    animReelH(reel, curX, ph.endX, null, 0, 0, function(){
      curX = ph.endX;
      if(ph.isClover){
        onCloverStop(ph.clv);
        phaseIdx++;
        setTimeout(runPhase, 1200);
      } else {
        afterSpin(winner, reel);
      }
    });
  }
  runPhase();
}

// ── Called when reel stops on a clover ──
function onCloverStop(clv){
  var ff = document.getElementById("ffx");

function addXP(a){S.xp+=a;var n=xpN(S.level);if(S.xp>=n){S.xp-=n;S.level++;S.coins+=S.level*50;toast("🎉 Уровень "+S.level+"! +"+(S.level*50)+" монет");}renderHdr();}
function toast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove();},2600);}
function updQ(gift){
  S.quests.forEach(function(q){if(q.claimed)return;if(q.type==="spins")q.p=Math.min(q.tgt,S.spins);else if(q.type==="rare"&&["R","E","L"].includes(gift.r))q.p=Math.min(q.tgt,q.p+1);else if(q.type==="legend"&&gift.r==="L")q.p=Math.min(q.tgt,q.p+1);else if(q.type==="collect")q.p=Math.min(q.tgt,Object.keys(S.col).length);if(q.p>=q.tgt&&!q.done){q.done=true;toast("✅ Квест: "+q.name+"!");}});
  if(S.chainIdx<QUEST_CHAIN.length){
    var cq=QUEST_CHAIN[S.chainIdx],prog=0;
    if(cq.type==="spins")prog=S.spins;
    else if(cq.type==="collect")prog=Object.keys(S.col).length;
    else if(cq.type==="wins")prog=S.wins;
    else if(cq.type==="rare"&&["R","E","L"].includes(gift.r)){S.chainQ=(S.chainQ||0)+1;prog=S.chainQ;}
    else if(cq.type==="rare_u"&&["U","R","E","L"].includes(gift.r)){S.chainQ=(S.chainQ||0)+1;prog=S.chainQ;}
    else if(cq.type==="rare_e"&&["E","L"].includes(gift.r)){S.chainQ=(S.chainQ||0)+1;prog=S.chainQ;}
    else if(cq.type==="legend"&&gift.r==="L"){S.chainQ=(S.chainQ||0)+1;prog=S.chainQ;}
    if(prog>=cq.tgt){S.chainIdx++;S.chainLuck+=10;S.chainQ=0;S.luckM=parseFloat((S.luckM+0.1).toFixed(3));renderHdr();toast("🍀 Цепь удачи: +10% удача! Итого +"+S.chainLuck+"%");saveSt();}
  }
}

function treeNode(u,bc,bc2){
  var lv=S.ulv[u.id]||0,cost=S.ucost[u.id],mx=lv>=u.max,ok=unl(u),ca=S.coins>=cost;
  var cls=ok?(mx?"tree-maxed":ca?"tree-avail":""):"tree-locked";
  var ncol=ok?(mx?"#4ade80":ca?bc:"#888"):"#555";
  var extra="";
  if(u.sp==="g")extra=`<div style="font-size:9px;color:var(--gold);font-weight:700">x${GI()} -> x2</div>`;
  if(u.sp==="d")extra=`<div style="font-size:9px;color:var(--dia);font-weight:700">x${DI()} -> x4</div>`;
  var pctBadge=u.pct?`<span style="background:rgba(74,222,128,.22);color:#4ade80;font-size:12px;font-weight:900;padding:3px 9px;border-radius:8px;display:inline-block;margin-top:4px">+${u.pct}% удача</span>`:"";
  var bars=Array.from({length:u.max},(_,j)=>`<div class="tree-bar ${j<lv?"filled":""}" style="--bc:${bc}"></div>`).join("");
  var costHtml;
  if(mx)costHtml=`<div class="tree-sub" style="background:rgba(74,222,128,.15);color:#4ade80">MAX</div>`;
  else if(!ok)costHtml=`<div class="tree-sub" style="background:rgba(255,255,255,.06);color:#666">LOCK</div>`;
  else costHtml=`<div style="font-size:12px;font-weight:800;color:${ca?"var(--gold)":"var(--red)"}">${cost}<br><span style="font-size:9px;font-weight:600;opacity:.7">монет</span></div>`;
  var iconBg=ok?`linear-gradient(145deg,${bc2}55,${bc2}22)`:"rgba(255,255,255,.04)";
  return `<div class="tree-node ${cls}" style="background:linear-gradient(145deg,rgba(255,255,255,.03),rgba(0,0,0,.2));border-color:${ncol}22;--nc:${ncol}" onclick="buyU('${u.id}')">
    <div class="tree-icon-box" style="background:${iconBg};border-color:${ncol}33;color:${ncol}">
      <div style="font-size:28px;line-height:1">${u.ico}</div>
      <div style="position:absolute;top:-7px;right:-7px;background:${bc};color:#000;font-size:9px;font-weight:900;border-radius:8px;padding:2px 5px;min-width:16px;text-align:center">${lv}/${u.max}</div>
    </div>
    <div class="tree-body">
      <div class="tree-name" style="color:${ok?"#fff":"#555"}">${u.name}${ok?"":" 🔒"}</div>
      <div class="tree-desc">${u.desc}</div>
      ${pctBadge}${extra}
      <div class="tree-bars" style="margin-top:5px">${bars}</div>
    </div>
    <div class="tree-cost-box">${costHtml}</div>
  </div>`;
}

  tabs.forEach(function(pair){var t=pair[0],l=ticons[t]+pair[1];h+='<button class="utab '+(S.utab===t?"on":"")+'\" onclick=\"utab(\''+t+'\')">'+l+'</button>';});
  h+='</div>';
  if(S.utab==="luck"||S.utab==="speed"){
    var br=UPGRADES[S.utab==="luck"?"luck":"speed"];
    var bc=S.utab==="luck"?"#8b5cf6":"#f97316";
    var bc2=S.utab==="luck"?"#4c1d95":"#78350f";
    if(S.utab==="luck"){
      var pctBonus=Math.round((S.luckM-1)*100);h+='<div style="background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);border-radius:12px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px"><div style="font-size:22px">🍀</div><div style="flex:1"><div style="font-size:11px;font-weight:800;color:#8b5cf6">Текущая удача</div><div style="font-size:18px;font-weight:900">x'+S.luckM.toFixed(2)+'</div></div><div style="text-align:right"><div style="font-size:11px;font-weight:800;color:#4ade80">+'+pctBonus+'%</div><div style="font-size:9px;color:rgba(255,255,255,.4)">от базы</div></div></div>';
      h+='<div style="background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15);border-radius:12px;padding:9px 12px;margin-bottom:12px"><div style="font-size:10px;font-weight:800;color:#4ade80;margin-bottom:6px">🍀 Клевера удачи (шанс 20% каждый)</div><div style="display:flex;flex-wrap:wrap;gap:5px">';
      CLOVERS.forEach(function(c,i){var pct=(Math.pow(0.2,i+1)*100).toFixed(i<3?1:2);h+='<div style="background:'+c.g1+';border:1px solid '+c.col+'44;border-radius:8px;padding:3px 8px;display:flex;align-items:center;gap:3px"><span style="font-size:12px">🍀</span><span style="font-size:10px;font-weight:900;color:'+c.col+'">'+c.label+'</span><span style="font-size:9px;color:rgba(255,255,255,.4)">'+pct+'%</span></div>';});
      h+='</div></div>';
    }else{
      h+='<div style="background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);border-radius:12px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px"><div style="font-size:22px">⚡</div><div><div style="font-size:11px;font-weight:800;color:#f97316">Авто-спин</div><div style="font-size:18px;font-weight:900">'+(hAu()?AS()+"ms":"Не куплен")+'</div></div></div>';
    }
    h+='<div class="tree-wrap">';
    br.forEach(function(u,i){if(i>0){var pl=(S.ulv[br[i-1].id]||0)>=1;h+='<div class="tree-conn '+(pl?"lit":"")+'"></div>';}h+=treeNode(u,bc,bc2);});
    h+='</div>';
  }else if(S.utab==="q")h+=rQ();else{h+=rLB();}
  h+='</div>';el.innerHTML=h;
}
function utab(t){S.utab=t;rUpg(document.getElementById("ct"));}
function buyU(id){var u=uid(id),lv=S.ulv[id]||0,cost=S.ucost[id];if(!unl(u)||S.coins<cost||lv>=u.max)return;S.coins-=cost;S.ulv[id]=lv+1;S.ucost[id]=Math.floor(cost*2.8);if(u.mult)S.luckM=parseFloat((S.luckM*u.mult).toFixed(3));renderHdr();saveSt();rUpg(document.getElementById("ct"));}
function rQ(){
  var h="";
  S.quests.forEach(function(q,qi){var p=Math.min(100,Math.round(q.p/q.tgt*100));h+='<div class="qc"><div class="qico">'+q.ico+'</div><div class="qbd"><div class="qnm">'+q.name+'</div><div class="qds">'+q.desc+'</div><div class="qbar"><div class="qbf" style="width:'+p+'%"></div></div><div class="qpg">'+q.p+'/'+q.tgt+'</div></div>'+(q.done&&!q.claimed?'<button class="qcbtn" onclick="claimQ('+qi+')">Забрать</button>':q.claimed?'<span style="font-size:12px;color:var(--tx3)">✅</span>':'<div class="qrw">🪙 '+q.rew.c+'</div>')+'</div>';});
  if(S.quests.every(function(q){return q.claimed;}))h+='<div style="text-align:center;padding:10px"><button onclick="newQ()" style="padding:9px 22px;border:none;border-radius:11px;background:var(--acc);color:#fff;font-size:13px;font-weight:800;font-family:var(--f);cursor:pointer">🔄 Новые квесты</button></div>';
  h+='<div style="margin-top:14px;border-top:1px solid var(--b);padding-top:12px"><div class="shdr"><span class="stitle" style="color:#4ade80">🍀 Цепь удачи</span><span style="font-size:11px;font-weight:700;color:#4ade80">+10% за каждый</span></div>';
  h+='<div style="background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);border-radius:11px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--tx2)">'+S.chainIdx+'/20 выполнено · <b style="color:#4ade80">+'+S.chainLuck+'% удачи</b></div>';
  var showMax=Math.min(QUEST_CHAIN.length,S.chainIdx+3);
  for(var i=0;i<showMax;i++){
    var q=QUEST_CHAIN[i],done=i<S.chainIdx,active=i===S.chainIdx,locked=i>S.chainIdx;
    var prog=0;
    if(active){if(q.type==="spins")prog=Math.min(q.tgt,S.spins);else if(q.type==="collect")prog=Math.min(q.tgt,Object.keys(S.col).length);else if(q.type==="wins")prog=Math.min(q.tgt,S.wins);else prog=Math.min(q.tgt,S.chainQ||0);}
    else if(done)prog=q.tgt;
    var pp=q.tgt>0?Math.min(100,Math.round(prog/q.tgt*100)):done?100:0;
    h+='<div class="qc" style="opacity:'+(locked?.35:1)+'"><div class="qico" style="font-size:18px">'+q.ico+'</div><div class="qbd"><div class="qnm">'+q.name+(locked?' 🔒':'')+'</div><div class="qds">'+q.desc+'</div>';
    if(!locked)h+='<div class="qbar"><div class="qbf" style="width:'+pp+'%;background:linear-gradient(90deg,#4ade80,#22c55e)"></div></div><div class="qpg">'+prog+'/'+q.tgt+'</div>';
    h+='</div><div class="qrw" style="color:#4ade80">'+(done?"✅":locked?"🔒":"+10%🍀")+'</div></div>';
  }
  if(S.chainIdx>=QUEST_CHAIN.length)h+='<div style="text-align:center;padding:10px;color:#4ade80;font-weight:800">✨ Все квесты выполнены!</div>';
  h+='</div>';return h;
}

async function loadLeaderboard(){
  try{
    const res = await window.storage.get('lb_players', true);

  }catch(e){ return []; }
}
async function saveToLeaderboard(){
  try{
    const tg = window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.initDataUnsafe;
    const user = tg&&tg.user;
    const uid = user ? String(user.id) : 'user_'+Math.random().toString(36).slice(2,8);
    const name = user ? (user.first_name+(user.last_name?' '+user.last_name:'')) : 'Игрок';
    const avatar = user&&user.username ? '@'+user.username : '👤';
    // Find rarest gift
    var rarestGift = null;
    var rarOrder = {L:0,E:1,R:2,U:3,C:4};
    Object.keys(S.col).forEach(function(id){
      var g = gid(id);
      if(!g) return;
      if(!rarestGift || rarOrder[g.r] < rarOrder[rarestGift.r] || (rarOrder[g.r]===rarOrder[rarestGift.r]&&g.sup<rarestGift.sup)){
        rarestGift = g;
      }
    });
    const entry = {
      uid: uid,
      name: name,
      avatar: avatar,
      coins: S.coins,
      luck: S.luckM,
      spins: S.spins,
      level: S.level,
      rarest: rarestGift ? rarestGift.id : null,
      rarestName: rarestGift ? rarestGift.n : '—',
      rarestR: rarestGift ? rarestGift.r : 'C',
      wins: S.wins,
      ts: Date.now(),
    };
    // Load, update, save
    var players = await loadLeaderboard();
    var idx2 = players.findIndex(p=>p.uid===uid);
    if(idx2>=0) players[idx2]=entry; else players.push(entry);
    // Sort by spins desc
    players.sort((a,b)=>b.spins-a.spins);
    // Keep top 100
    players = players.slice(0,100);
    await window.storage.set('lb_players', JSON.stringify(players), true);
    S._lbSaved = true;
  }catch(e){}
}

    var sk=has?(SKINS.find(function(s){return s.id===S.col[g.id].skin;})||SKINS[0]):SKINS[0];
    var rs=RS[g.r];
    // Use getGiftStats which includes skin+bg bonuses
    var st=has?getGiftStats(g.id):(RARITY_STATS[g.r]||{loot:0,spd:0,luck:0});
    var onclick_attr=has?'onclick="openDet(\''+g.id+'\')"':"";
    h+="<div class=\"bpc "+g.r+" "+(has?"":"lk")+"\" style=\""+cs(g)+"\" "+onclick_attr+">";
    h+='<div class="sh"></div>';
    h+="<div style=\"position:absolute;top:5px;right:5px;z-index:9;background:"+rs.c+";color:#000;font-size:7.5px;font-weight:900;padding:2px 5px;border-radius:5px\">"+rs.badge+"</div>";
    if(has){
      h+="<img src=\""+IMG+g.id+"/thumb.webp\" referrerpolicy=\"no-referrer\" style=\"width:60%;height:52%;object-fit:contain;z-index:2;filter:"+sk.f+";display:block;position:relative\" onerror=\"this.textContent='"+g.e+"';this.style.fontSize='26px';this.style.display='flex'\">";
      // Bonus chips showing stats WITH skin+bg
      h+='<div style="position:absolute;bottom:18px;left:0;right:0;display:flex;justify-content:center;gap:2px;z-index:7;padding:0 3px;flex-wrap:wrap">';
      h+="<div style=\"background:rgba(0,0,0,.8);border-radius:4px;padding:1px 3px;font-size:6.5px;font-weight:800;color:#f5c842\">+"+st.loot+"%🪙</div>";
      if(st.spd>0)h+="<div style=\"background:rgba(0,0,0,.8);border-radius:4px;padding:1px 3px;font-size:6.5px;font-weight:800;color:#60a5fa\">+"+st.spd+"%⚡</div>";
      if(st.luck>0)h+="<div style=\"background:rgba(0,0,0,.8);border-radius:4px;padding:1px 3px;font-size:6.5px;font-weight:800;color:#4ade80\">+"+st.luck+"%🍀</div>";
      h+='</div>';
      // Show skin indicator if not standard
      if(S.col[g.id].skin && S.col[g.id].skin!=="std"){
        h+="<div style=\"position:absolute;top:5px;left:5px;z-index:9;background:rgba(0,0,0,.7);border-radius:4px;padding:2px 4px;font-size:7px;font-weight:800;color:"+RS[sk.r].c+"\">"+sk.name+"</div>";
      }
    }else h+='<div style="font-size:28px;opacity:.3">❓</div>';
    h+="<div class=\"bpn\">"+g.n+"</div>"+(cnt>1?"<div class=\"bpcnt\">x"+(cnt>99?"99+":cnt)+"</div>":"")+"</div>";
  });
  h+='</div></div>';el.innerHTML=h;
}

function setBpFilter(f){S.bpFilter=f;rBp(document.getElementById("ct"));}

function openDet(id){
  var g=gid(id);if(!g)return;var col=S.col[id]||{cnt:0,skin:"std",bg:"std"};var rs=RS[g.r];
  document.getElementById("gdcrd").style.background="linear-gradient(145deg,"+g.g1+","+g.g2+")";
  var curSk=SKINS.find(function(s){return s.id===col.skin;})||SKINS[0];
  document.getElementById("gdgi").innerHTML='<img src="'+IMG+g.id+'/thumb.webp" referrerpolicy="no-referrer" style="width:80%;height:80%;object-fit:contain;filter:'+curSk.f+';display:block" onerror="this.textContent=\''+g.e+'\';this.style.cssText=\'font-size:44px;display:flex;align-items:center;justify-content:center\'">';
  document.getElementById("gdnm").textContent=g.n;
  document.getElementById("gdrar").textContent=rs.label;
  document.getElementById("gdrar").style.cssText="background:"+rs.bg+";color:"+rs.c+";font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block";
  document.getElementById("gdcnt").textContent="x"+col.cnt+" · "+pctChance(g)+"% шанс";
  var gst=getGiftStats(g.id);
  var statEl=document.getElementById("gd-stats");
  if(statEl)statEl.innerHTML='<div style="display:flex;gap:5px;margin-top:5px;flex-wrap:wrap">'
    +'<div style="background:rgba(245,200,66,.12);border-radius:7px;padding:3px 8px;font-size:9.5px;font-weight:800;color:#f5c842">🪙 +'+gst.loot+'% добыча</div>'
    +'<div style="background:rgba(96,165,250,.12);border-radius:7px;padding:3px 8px;font-size:9.5px;font-weight:800;color:#60a5fa">⚡ +'+gst.spd+'% скорость</div>'
    +'<div style="background:rgba(74,222,128,.12);border-radius:7px;padding:3px 8px;font-size:9.5px;font-weight:800;color:#4ade80">🍀 +'+gst.luck+'% удача</div>'
    +'</div>';
  // 10 skins
  document.getElementById("gdskins").innerHTML=SKINS.map(function(sk){
    var eq=col.skin===sk.id;var can=sk.free||S.coins>=sk.cost;
    var bonuses='<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-top:3px">'
      +(sk.loot>0?'<span style="font-size:7.5px;font-weight:800;color:#f5c842">+'+sk.loot+'%🪙</span>':"")
      +(sk.spd>0?'<span style="font-size:7.5px;font-weight:800;color:#60a5fa">+'+sk.spd+'%⚡</span>':"")
      +(sk.luck>0?'<span style="font-size:7.5px;font-weight:800;color:#4ade80">+'+sk.luck+'%🍀</span>':"")
      +'</div>';
    return '<div class="skc '+(eq?"eq":"")+'\" onclick=\"eqSk(\''+id+'\',\''+sk.id+'\')">'
      +'<div class="skpre" style="height:46px;display:flex;align-items:center;justify-content:center">'
      +'<img src="'+IMG+g.id+'/thumb.webp" referrerpolicy="no-referrer" style="height:38px;object-fit:contain;filter:'+sk.f+';'+(sk.rainbow?"animation:rbwanim 2s linear infinite":"")+'" onerror="this.textContent=\''+g.e+'\';this.style.fontSize=\'26px\'"></div>'
      +'<div class="sknam">'+sk.name+' <span style="font-size:8px;color:'+RS[sk.r].c+'">'+sk.r+'</span></div>'
      +bonuses
      +(sk.free?'<div style="font-size:9px;color:#10b981;text-align:center;font-weight:600">Бесплатно</div>':'<div class="skcst" style="color:'+(can?"var(--gold)":"var(--red)")+'">🪙 '+sk.cost+'</div>')
      +(eq?'<div style="font-size:9px;color:var(--acc);text-align:center;font-weight:700">✅ Надет</div>':"")+'</div>';
  }).join("");
  // 10 backgrounds
  document.getElementById("gdbgs").innerHTML=BGS.map(function(bg){
    var eq=col.bg===bg.id;var can=bg.free||S.coins>=bg.cost;
    var previewStyle=bg.bg==="rainbow"?"background:linear-gradient(135deg,#ff006e,#fb5607,#ffbe0b,#3a86ff)":bg.bg?"background:"+bg.bg:"background:linear-gradient(145deg,"+g.g1+","+g.g2+")";
    var bonuses='<div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap;margin-top:3px">'
      +(bg.loot>0?'<span style="font-size:7.5px;font-weight:800;color:#f5c842">+'+bg.loot+'%🪙</span>':"")
      +(bg.spd>0?'<span style="font-size:7.5px;font-weight:800;color:#60a5fa">+'+bg.spd+'%⚡</span>':"")
      +(bg.luck>0?'<span style="font-size:7.5px;font-weight:800;color:#4ade80">+'+bg.luck+'%🍀</span>':"")
      +'</div>';
    return '<div class="skc '+(eq?"eq":"")+'\" onclick=\"eqBg(\''+id+'\',\''+bg.id+'\')">'
      +'<div class="skpre" style="height:46px;display:flex;align-items:center;justify-content:center;'+previewStyle+';border-radius:8px"></div>'
      +'<div class="sknam">'+bg.name+' <span style="font-size:8px;color:'+RS[bg.r].c+'">'+bg.r+'</span></div>'
      +bonuses
      +(bg.free?'<div style="font-size:9px;color:#10b981;text-align:center;font-weight:600">Бесплатно</div>':'<div class="skcst" style="color:'+(can?"var(--gold)":"var(--red)")+'">🪙 '+bg.cost+'</div>')
      +(eq?'<div style="font-size:9px;color:var(--acc);text-align:center;font-weight:700">✅ Надет</div>':"")+'</div>';
  }).join("");
  S.det=id;document.getElementById("gds").style.display="flex";
}
function closeGDS(e){if(e.target.id==="gds"){document.getElementById("gds").style.display="none";S.det=null;}}
function eqSk(gid_,sid){
  var sk=SKINS.find(function(s){return s.id===sid;});
  if(!sk.free&&S.coins<sk.cost){toast("❌ Мало монет!");return;}
  if(!S.col[gid_])return;
  if(S.col[gid_].skin!==sid&&!sk.free)S.coins-=sk.cost;
  S.col[gid_].skin=sid;
  renderHdr();saveSt();
  openDet(gid_);
  // Update the gift card in backpack grid immediately
  var imgEl=document.querySelector('.bpc img[src*="'+gid_+'"]');
  if(imgEl) imgEl.style.filter=sk.f;
  // Also update skin badge if visible
  var skinBadge=document.querySelector('.bpc[onclick*="'+gid_+'"] .skin-badge');
  if(skinBadge) skinBadge.textContent=sk.id!=="std"?sk.name:"";
}
function eqBg(gid_,bid){
  var bg=BGS.find(function(b){return b.id===bid;});
  if(!bg.free&&S.coins<bg.cost){toast("❌ Мало монет!");return;}
  if(!S.col[gid_])return;
  if(S.col[gid_].bg!==bid&&!bg.free)S.coins-=bg.cost;
  S.col[gid_].bg=bid;
  renderHdr();saveSt();
  openDet(gid_);
  // Update card background in backpack grid  
  var card=document.querySelector('.bpc[onclick*="'+gid_+'"]');
  if(card&&bg.bg&&bg.bg!=="rainbow") card.style.background=bg.bg;
  else if(card&&!bg.bg) card.style.background="";
}

// ── PARTICLES ──
function spawnPts(gift){var n=gift.r==="L"?140:80;var cols=gift.r==="L"?["#4ade80","#fff","#86efac","#22c55e"]:["#fbbf24","#fff","#f59e0b"];var cx=window.innerWidth/2,cy=window.innerHeight*.42;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=2+Math.random()*(gift.r==="L"?16:10);pts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*9,life:1,dec:.011+Math.random()*.02,sz:3+Math.random()*(gift.r==="L"?12:8),col:cols[Math.floor(Math.random()*cols.length)],star:Math.random()<.5});}}
function pLoop(){requestAnimationFrame(pLoop);if(!pts.length){pCtx.clearRect(0,0,pCv.width,pCv.height);return;}pCtx.clearRect(0,0,pCv.width,pCv.height);pts=pts.filter(function(p){return p.life>0;});pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=.29;p.life-=p.dec;p.vx*=.98;pCtx.save();pCtx.globalAlpha=Math.max(0,p.life);pCtx.fillStyle=p.col;if(p.star){pCtx.translate(p.x,p.y);pCtx.rotate(p.life*8);pCtx.beginPath();for(var i=0;i<5;i++){var a=(i*Math.PI*2/5)-Math.PI/2,ai=a+Math.PI/5;if(i===0)pCtx.moveTo(Math.cos(a)*p.sz,Math.sin(a)*p.sz);else pCtx.lineTo(Math.cos(a)*p.sz,Math.sin(a)*p.sz);pCtx.lineTo(Math.cos(ai)*p.sz*.42,Math.sin(ai)*p.sz*.42);}pCtx.closePath();pCtx.fill();}else{pCtx.beginPath();pCtx.arc(p.x,p.y,p.sz/2,0,Math.PI*2);pCtx.fill();}pCtx.restore();});}

function toggleVol(){SFX.vol=!SFX.vol;document.getElementById("vbtn").textContent=SFX.vol?"🔊":"🔇";}

function init(){
  SFX.init();pCv=document.getElementById("pc");pCtx=pCv.getContext("2d");
  pCv.width=window.innerWidth;pCv.height=window.innerHeight;
  window.addEventListener("resize",function(){pCv.width=window.innerWidth;pCv.height=window.innerHeight;});
  requestAnimationFrame(pLoop);buildOvBg();T("spin");renderHdr();
  if(S.abTeam&&S.abTeam.length)S.team=[...S.abTeam];
  if(window.Telegram&&window.Telegram.WebApp){window.Telegram.WebApp.ready();window.Telegram.WebApp.expand();}
}
window.addEventListener("DOMContentLoaded",init);

</script>
